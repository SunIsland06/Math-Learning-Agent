<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <form class="card" method="POST">
        <div>
            <div class="title">创建账号</div>
            <div class="subtitle">填写账号信息，开始你的学习之旅</div>
        </div>
        <div class="field">
            <label for="username">账号</label>
            <input id="username" type="text" name="username" placeholder="请输入账号" required>
        </div>
        <div class="field">
            <label for="pwd">密码</label>
            <div class="password-field">
                <input id="pwd" type="password" name="pwd" placeholder="请输入密码" required>
                <button class="show-btn" type="button" data-target="pwd" aria-label="按住显示密码">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M2.5 12s3.5-6.5 9.5-6.5 9.5 6.5 9.5 6.5-3.5 6.5-9.5 6.5S2.5 12 2.5 12z"></path>
                        <circle cx="12" cy="12" r="3.5"></circle>
                    </svg>
                </button>
            </div>
        </div>
        <div class="field">
            <label for="pwd_confirm">重复密码</label>
            <div class="password-field">
                <input id="pwd_confirm" type="password" name="pwd_confirm" placeholder="请再次输入密码" required>
                <button class="show-btn" type="button" data-target="pwd_confirm" aria-label="按住显示密码">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M2.5 12s3.5-6.5 9.5-6.5 9.5 6.5 9.5 6.5-3.5 6.5-9.5 6.5S2.5 12 2.5 12z"></path>
                        <circle cx="12" cy="12" r="3.5"></circle>
                    </svg>
                </button>
            </div>
        </div>
        <button type="submit">注册</button>
        <div class="footer">注册后请返回登录页面继续。</div>
    </form>
    <script>
        const showButtons = document.querySelectorAll(".show-btn");

        showButtons.forEach((btn) => {
            const targetId = btn.getAttribute("data-target");
            const input = document.getElementById(targetId);
            if (!input) {
                return;
            }

            const show = () => {
                input.type = "text";
                btn.classList.add("is-revealed");
            };

            const hide = () => {
                input.type = "password";
                btn.classList.remove("is-revealed");
            };

            btn.addEventListener("mousedown", show);
            btn.addEventListener("touchstart", show);
            btn.addEventListener("mouseup", hide);
            btn.addEventListener("mouseleave", hide);
            btn.addEventListener("touchend", hide);
            btn.addEventListener("touchcancel", hide);
            btn.addEventListener("blur", hide);
        });
    </script>
</body>
</html>
