<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <style>
        :root {
            --bg-1: #0b0f17;
            --bg-2: #0f1623;
            --panel: #141b2d;
            --accent: #5b8cff;
            --text-1: #e8eefc;
            --text-2: #b8c4df;
            --muted: #7f8aa8;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 24px 60px rgba(4, 8, 20, 0.65);
            --radius-lg: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Microsoft YaHei", "微软雅黑", "Noto Sans SC", sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(1200px 600px at 15% -10%, rgba(91, 140, 255, 0.22), transparent 60%),
                radial-gradient(900px 600px at 90% 10%, rgba(51, 227, 189, 0.16), transparent 65%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: var(--text-1);
            padding: 24px;
        }

        .card {
            width: min(420px, 92vw);
            background: var(--panel);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 28px;
            display: grid;
            gap: 16px;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        label {
            font-size: 12px;
            color: var(--text-2);
        }

        input {
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(12, 18, 32, 0.9);
            color: var(--text-1);
            font-size: 14px;
        }

        input::placeholder {
            color: var(--muted);
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #2fe1a0);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 12px 26px rgba(91, 140, 255, 0.35);
        }

        .footer {
            font-size: 12px;
            color: var(--text-2);
        }
    </style>
</head>
<body>
    <form class="card" method="POST">
        <div>
            <div class="title">创建账号</div>
            <div class="subtitle">填写账号信息，开始你的学习之旅</div>
        </div>
        <div class="field">
            <label for="username">账号</label>
            <input id="username" type="text" name="username" placeholder="请输入账号" required>
        </div>
        <div class="field">
            <label for="pwd">密码</label>
            <input id="pwd" type="password" name="pwd" placeholder="请输入密码" required>
        </div>
        <button type="submit">注册</button>
        <div class="footer">注册后请返回登录页面继续。</div>
    </form>
</body>
</html>
