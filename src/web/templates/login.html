<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
    <style>
        :root {
            --bg-1: #0b0f17;
            --bg-2: #0f1623;
            --panel: #141b2d;
            --accent: #5b8cff;
            --text-1: #e8eefc;
            --text-2: #b8c4df;
            --muted: #7f8aa8;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 24px 60px rgba(4, 8, 20, 0.65);
            --radius-lg: 16px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Microsoft YaHei", "微软雅黑", "Noto Sans SC", sans-serif;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(1200px 600px at 15% -10%, rgba(91, 140, 255, 0.22), transparent 60%),
                radial-gradient(900px 600px at 90% 10%, rgba(51, 227, 189, 0.16), transparent 65%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: var(--text-1);
            padding: 24px;
        }

        .card {
            width: min(420px, 92vw);
            background: var(--panel);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 28px;
            display: grid;
            gap: 16px;
        }

        .title {
            font-size: 22px;
            font-weight: 600;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        .password-field {
            position: relative;
        }

        label {
            font-size: 12px;
            color: var(--text-2);
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(12, 18, 32, 0.9);
            color: var(--text-1);
            font-size: 14px;
        }

        .password-field input {
            padding-right: 46px;
        }

        .show-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 34px;
            padding: 0;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(232, 238, 252, 0.75);
            cursor: pointer;
            display: grid;
            place-items: center;
        }

        .show-btn:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .show-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
        }

        .show-btn::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 2px;
            background: currentColor;
            transform: rotate(-35deg);
            opacity: 0.7;
        }

        .show-btn.is-revealed::after {
            opacity: 0;
        }

        input::placeholder {
            color: var(--muted);
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--accent), #2fe1a0);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 12px 26px rgba(91, 140, 255, 0.35);
        }

        .footer {
            font-size: 12px;
            color: var(--text-2);
        }

        .footer a {
            color: #8fb3ff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <form class="card" method="POST">
        <div>
            <div class="title">欢迎回来</div>
            <div class="subtitle">请输入账号密码继续</div>
        </div>
        <div class="field">
            <label for="username">账号</label>
            <input id="username" type="text" name="username" placeholder="输入账号" required>
        </div>
        <div class="field">
            <label for="pwd">密码</label>
            <div class="password-field">
                <input id="pwd" type="password" name="pwd" placeholder="输入密码" required>
                <button class="show-btn" type="button" data-target="pwd" aria-label="按住显示密码">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M2.5 12s3.5-6.5 9.5-6.5 9.5 6.5 9.5 6.5-3.5 6.5-9.5 6.5S2.5 12 2.5 12z"></path>
                        <circle cx="12" cy="12" r="3.5"></circle>
                    </svg>
                </button>
            </div>
        </div>
        <button type="submit">登录</button>
        <div class="footer">还没有账号？<a href="{{ url_for('register') }}">点击注册</a></div>
    </form>
    <script>
        const showButtons = document.querySelectorAll(".show-btn");

        showButtons.forEach((btn) => {
            const targetId = btn.getAttribute("data-target");
            const input = document.getElementById(targetId);
            if (!input) {
                return;
            }

            const show = () => {
                input.type = "text";
                btn.classList.add("is-revealed");
            };

            const hide = () => {
                input.type = "password";
                btn.classList.remove("is-revealed");
            };

            btn.addEventListener("mousedown", show);
            btn.addEventListener("touchstart", show);
            btn.addEventListener("mouseup", hide);
            btn.addEventListener("mouseleave", hide);
            btn.addEventListener("touchend", hide);
            btn.addEventListener("touchcancel", hide);
            btn.addEventListener("blur", hide);
        });
    </script>
</body>
</html>
