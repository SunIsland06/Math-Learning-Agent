<!DOCTYPE html>
<html data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Learning Agent</title>
    <link rel="stylesheet" href="/static/vendor/katex/katex.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== 亮色主题 ===== */
        [data-theme="light"] {
            --bg-1: #f5f5f7;
            --bg-2: #ffffff;
            --panel: #ffffff;
            --panel-alt: #f9f9fb;
            --accent: #3b6df0;
            --accent-strong: #2554d9;
            --text-1: #1d1d1f;
            --text-2: #3a3a3d;
            --muted: #86868b;
            --success: #2ecc71;
            --border: rgba(0, 0, 0, 0.08);
            --border-strong: rgba(0, 0, 0, 0.14);
            --shadow: 0 2px 24px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.12);
            --glass: rgba(255, 255, 255, 0.7);
            --hover: rgba(0, 0, 0, 0.04);
            --code-bg: #f0f0f5;
            --gradient-1: rgba(59, 109, 240, 0.06);
            --gradient-2: rgba(46, 204, 113, 0.05);
            --user-msg-bg: #eef1ff;
            --ai-msg-bg: #f5f5f7;
            --input-bg: #ffffff;
            --sidebar-bg: linear-gradient(180deg, #f9f9fb 0%, #f0f0f5 100%);
            --composer-bg: #ffffff;
        }

        /* ===== 暗色主题（默认） ===== */
        [data-theme="dark"] {
            --bg-1: #0b0b0c;
            --bg-2: #151618;
            --panel: #1c1d21;
            --panel-alt: #141519;
            --accent: #7b9fff;
            --accent-strong: #91b3ff;
            --text-1: #f0f0f2;
            --text-2: #c8cad0;
            --muted: #7a7d85;
            --success: #4fd38a;
            --border: rgba(255, 255, 255, 0.07);
            --border-strong: rgba(255, 255, 255, 0.12);
            --shadow: 0 4px 32px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 12px 48px rgba(0, 0, 0, 0.6);
            --glass: rgba(28, 29, 33, 0.6);
            --hover: rgba(255, 255, 255, 0.05);
            --code-bg: rgba(255, 255, 255, 0.06);
            --gradient-1: rgba(123, 159, 255, 0.06);
            --gradient-2: rgba(79, 211, 138, 0.04);
            --user-msg-bg: rgba(123, 159, 255, 0.12);
            --ai-msg-bg: rgba(255, 255, 255, 0.04);
            --input-bg: rgba(18, 18, 22, 0.95);
            --sidebar-bg: linear-gradient(180deg, #1d1f24 0%, #141519 100%);
            --composer-bg: #17181c;
        }

        :root {
            --radius-xl: 18px;
            --radius-lg: 12px;
            --radius-md: 8px;
            --radius-sm: 6px;
            --font-mono: "JetBrains Mono", "Cascadia Code", "Fira Code", "Consolas", monospace;
            --font-sans: "Noto Sans SC", "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            color: var(--text-1);
            background: var(--bg-1);
            background-image: radial-gradient(800px 500px at 5% -10%, var(--gradient-1), transparent 60%),
                radial-gradient(700px 450px at 95% 5%, var(--gradient-2), transparent 65%);
            height: 100vh;
            overflow: hidden;
            padding: 12px;
            transition: background 0.4s ease, color 0.4s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 布局 ===== */
        .layout {
            display: grid;
            grid-template-columns: 290px 1fr;
            height: calc(100vh - 24px);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            overflow: hidden;
            background: var(--panel);
            box-shadow: var(--shadow-lg);
            transition: border-color 0.4s ease, background 0.4s ease;
        }

        .layout.sidebar-hidden { grid-template-columns: 0 1fr; }

        /* ===== 侧边栏 ===== */
        .sidebar {
            border-right: 1px solid var(--border);
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 100%;
            overflow: hidden;
            background: var(--sidebar-bg);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.3s ease, border-color 0.4s ease;
        }

        .layout.sidebar-hidden .sidebar {
            transform: translateX(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .sidebar-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .sidebar-top .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-top .brand .logo {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent), var(--success));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
            font-weight: 700;
            font-family: var(--font-mono);
        }

        .sidebar-top .brand strong {
            font-size: 16px;
            letter-spacing: 0.3px;
            font-weight: 600;
        }

        .sidebar-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .icon-btn {
            width: 32px; height: 32px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-2);
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .icon-btn:hover {
            background: var(--hover);
            color: var(--text-1);
            border-color: var(--border-strong);
        }

        .logout-btn {
            padding: 5px 10px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.2px;
            transition: opacity 0.2s ease;
        }
        .logout-btn:hover { opacity: 0.85; }

        .ghost-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-2);
            font-size: 12px;
            cursor: pointer;
            font-family: var(--font-sans);
            transition: all 0.2s ease;
        }

        .ghost-btn:hover {
            border-color: var(--border-strong);
            color: var(--text-1);
            background: var(--hover);
        }

        .new-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent), var(--success));
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            font-family: var(--font-sans);
            cursor: pointer;
            letter-spacing: 0.2px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 4px 16px rgba(59, 109, 240, 0.25);
        }
        .new-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 109, 240, 0.35);
        }

        /* ===== 设置弹窗 ===== */
        .settings-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        .settings-modal.open { display: flex; }

        .settings-card {
            width: min(440px, 92vw);
            background: var(--panel);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: fadeUp 0.25s ease both;
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        .settings-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: var(--panel-alt);
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            transition: background 0.4s ease;
        }

        .setting-item label {
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }

        .setting-item select {
            padding: 4px 6px;
            font-size: 11px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text-1);
            font-family: var(--font-sans);
        }

        .toggle-switch {
            position: relative;
            width: 36px; height: 20px;
            flex-shrink: 0;
        }
        .toggle-switch input { display: none; }
        .toggle-switch .slider {
            position: absolute;
            inset: 0;
            background: var(--border);
            border-radius: 99px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .toggle-switch .slider::after {
            content: "";
            position: absolute;
            top: 2px; left: 2px;
            width: 16px; height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s ease;
        }
        .toggle-switch input:checked + .slider { background: var(--accent); }
        .toggle-switch input:checked + .slider::after { transform: translateX(16px); }

        .settings-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        /* ===== 会话列表 ===== */
        #session-list {
            overflow-y: auto;
            min-height: 0;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 2px;
        }

        #session-list::-webkit-scrollbar { width: 5px; }
        #session-list::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 3px;
        }

        .session-row {
            display: grid;
            grid-template-columns: 1fr 30px 30px;
            gap: 4px;
            animation: fadeUp 0.25s ease both;
        }

        .session-item {
            width: 100%;
            text-align: left;
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-1);
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-family: var(--font-sans);
            font-size: 12px;
            transition: all 0.2s ease;
        }

        .session-item:hover { background: var(--hover); border-color: var(--border-strong); }
        .session-item.active {
            border-color: var(--accent);
            background: var(--user-msg-bg);
        }

        .mini-btn {
            width: 30px; height: 30px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: transparent;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .mini-btn.edit { color: var(--accent); }
        .mini-btn.delete { color: #ef4444; }
        .mini-btn:hover { background: var(--hover); border-color: var(--border-strong); }

        .empty {
            color: var(--muted);
            font-size: 13px;
            padding: 12px 4px;
            text-align: center;
        }

        /* ===== 聊天面板 ===== */
        .chat-panel {
            display: flex;
            flex-direction: column;
            min-width: 0;
            min-height: 0;
            height: 100%;
            background: var(--panel-alt);
            transition: background 0.4s ease;
        }

        #chat-box {
            padding: 24px 32px 20px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
        }

        #chat-box::-webkit-scrollbar { width: 6px; }
        #chat-box::-webkit-scrollbar-thumb {
            background: var(--border-strong);
            border-radius: 99px;
        }

        .item {
            margin: 8px 0;
            padding: 14px 18px;
            border-radius: var(--radius-lg);
            display: flex;
            gap: 10px;
            animation: fadeUp 0.3s ease both;
            width: 66%;
            max-width: 800px;
            min-width: 280px;
            align-self: center;
        }

        .item .label {
            flex-shrink: 0;
            font-weight: 600;
            font-size: 13px;
            opacity: 0.7;
            padding-top: 1px;
        }

        .user {
            background: var(--user-msg-bg);
            align-self: flex-end;
            margin-left: auto;
            margin-right: 0;
            border: 1px solid var(--border);
        }

        .ai {
            background: var(--ai-msg-bg);
            align-self: flex-start;
            margin-right: auto;
            margin-left: 0;
            border: 1px solid var(--border);
        }

        .message-body {
            width: 100%;
            line-height: 1.7;
            font-size: 14px;
            word-break: break-word;
        }

        .message-body.plain { white-space: pre-wrap; }
        .message-body p { margin: 0 0 8px; }
        .message-body p:last-child { margin-bottom: 0; }
        .message-body hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 12px 0;
        }

        .message-body h1, .message-body h2, .message-body h3, .message-body h4 {
            margin: 14px 0 8px;
            font-weight: 600;
            line-height: 1.4;
        }
        .message-body h1 { font-size: 1.3em; }
        .message-body h2 { font-size: 1.15em; }
        .message-body h3 { font-size: 1.05em; }

        .message-body ul, .message-body ol { margin: 6px 0; padding-left: 20px; }
        .message-body li { margin: 3px 0; }

        .message-body code {
            font-family: var(--font-mono);
            font-size: 0.9em;
            background: var(--code-bg);
            padding: 2px 6px;
            border-radius: 3px;
        }

        .message-body pre {
            background: var(--code-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px;
            overflow-x: auto;
            margin: 10px 0;
        }

        .message-body pre code {
            font-family: var(--font-mono);
            font-size: 0.85em;
            background: none;
            padding: 0;
            line-height: 1.6;
        }

        .message-body blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 12px;
            margin: 8px 0;
            color: var(--text-2);
        }

        .message-body .katex-display { margin: 10px 0; }
        .message-body .katex { font-size: 1.05em; }

        .message-body .mermaid {
            margin: 10px 0;
            padding: 14px;
            background: var(--code-bg);
            border-radius: var(--radius-md);
            overflow-x: auto;
            text-align: center;
        }
        .message-body .mermaid svg { max-width: 100%; height: auto; }

        .message-body .reference-section {
            margin-top: 14px;
            padding: 12px 14px;
            background: var(--code-bg);
            border-radius: var(--radius-md);
            border-left: 3px solid var(--accent);
            font-size: 12px;
            line-height: 1.8;
        }
        .message-body .reference-section a {
            color: var(--accent-strong);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.9em;
        }
        .message-body .reference-section a:hover { text-decoration: underline; }

        .message-body img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius-md);
        }

        .message-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 0.9em;
        }
        .message-body th, .message-body td {
            border: 1px solid var(--border);
            padding: 8px 10px;
            text-align: left;
            vertical-align: top;
        }
        .message-body thead th {
            background: var(--code-bg);
            font-weight: 600;
        }

        /* ===== 输入栏 ===== */
        .composer {
            border-top: 1px solid var(--border);
            padding: 14px 16px;
            display: grid;
            grid-template-columns: 38px 1fr 80px;
            gap: 10px;
            background: var(--composer-bg);
            align-items: center;
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        .composer-input { display: flex; flex-direction: column; gap: 6px; }

        .attach-btn {
            width: 36px; height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-2);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .attach-btn:hover {
            background: var(--hover);
            color: var(--text-1);
        }

        .attachment-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .attachment-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 99px;
            background: var(--code-bg);
            border: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-1);
        }
        .attachment-chip img {
            width: 20px; height: 20px;
            border-radius: 4px;
            object-fit: cover;
        }
        .attachment-remove {
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            padding: 0 2px;
        }
        .attachment-remove:hover { color: #ef4444; }

        #question {
            width: 100%;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 99px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-1);
            font-family: var(--font-sans);
            transition: all 0.2s ease;
        }
        #question::placeholder { color: var(--muted); }
        #question:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 109, 240, 0.15);
        }

        #send-btn {
            padding: 10px 16px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            font-family: var(--font-sans);
            letter-spacing: 0.2px;
            transition: all 0.2s ease;
        }
        #send-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .sidebar-toggle {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 2;
        }
        .layout.sidebar-hidden .sidebar-toggle { left: 20px; }
        .layout:not(.sidebar-hidden) .sidebar-toggle {
            opacity: 0;
            pointer-events: none;
        }

        #file-input { display: none; }

        /* ===== 响应式 ===== */
        @media (max-width: 768px) {
            .layout { grid-template-columns: 1fr; }
            .layout.sidebar-hidden { grid-template-columns: 1fr; }
            .sidebar { position: fixed; inset: 0; z-index: 5; border-radius: 0; }
            .layout:not(.sidebar-hidden) .chat-panel { display: none; }
            .layout.sidebar-hidden .sidebar { transform: translateX(-100%); }
            .layout:not(.sidebar-hidden) .sidebar-toggle { display: none; }
            .item { width: 90%; min-width: 0; }
            #chat-box { padding: 16px; }
            .composer { grid-template-columns: 34px 1fr 68px; gap: 6px; padding: 10px 12px; }
            .settings-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <div class="layout">
        <button class="ghost-btn sidebar-toggle" id="sidebar-toggle" type="button">☰ 会话</button>

        <aside class="sidebar">
            <div class="sidebar-top">
                <div class="brand">
                    <div class="logo">M</div>
                    <strong>Math Agent</strong>
                </div>
                <div class="sidebar-actions">
                    <button class="icon-btn" id="theme-toggle" type="button" title="切换主题">🌙</button>
                    <button class="icon-btn" id="settings-btn" type="button" title="设置">⚙</button>
                    <button class="icon-btn" id="hide-sidebar-btn" type="button" title="隐藏侧边栏">◀</button>
                    <a href="/logout" class="logout-btn">退出</a>
                </div>
            </div>

            <button class="new-btn" onclick="createSession()">+ 新建会话</button>

            <div id="session-list"></div>
        </aside>

        <main class="chat-panel">
            <div id="chat-box"></div>
            <div class="composer">
                <button class="attach-btn" id="attach-btn" type="button">+</button>
                <div class="composer-input">
                    <div id="attachment-list" class="attachment-list"></div>
                    <input type="text" id="question" placeholder="输入数学问题，回车发送...">
                </div>
                <button id="send-btn" onclick="sendQuestion()">发送</button>
            </div>
        </main>
    </div>

    <input type="file" id="file-input" multiple accept=".png,.jpg,.jpeg,.webp,.md,.pdf,.doc,.docx,.word,.ppt,.pptx">

    <!-- 设置弹窗 -->
    <div class="settings-modal" id="settings-modal" role="dialog" aria-modal="true">
        <div class="settings-card">
            <div class="settings-title">⚙ 对话设置</div>
            <div class="settings-grid">
                <div class="setting-item">
                    <label>
                        <span class="toggle-switch"><input type="checkbox" id="enable-thinking"><span class="slider"></span></span>
                        深度思考
                    </label>
                    <select id="thinking-strength">
                        <option value="high" selected>高</option>
                        <option value="max">极高</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>
                        <span class="toggle-switch"><input type="checkbox" id="enable-search"><span class="slider"></span></span>
                        联网搜索
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <span class="toggle-switch"><input type="checkbox" id="enable-memory"><span class="slider"></span></span>
                        记忆模式
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <span class="toggle-switch"><input type="checkbox" id="enable-dark" checked><span class="slider"></span></span>
                        暗色主题
                    </label>
                </div>
            </div>
            <div class="settings-actions">
                <button class="ghost-btn" id="close-settings-btn" type="button">关闭</button>
            </div>
        </div>
    </div>

    <script src="/static/vendor/katex/katex.min.js"></script>
    <script src="/static/vendor/katex/contrib/auto-render.min.js"></script>
    <script src="/static/vendor/markdown-it/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        // ===== 主题管理 =====
        function getTheme() {
            try { return localStorage.getItem("math-agent-theme") || "dark"; }
            catch(e) { return "dark"; }
        }
        function setTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            document.getElementById("enable-dark").checked = theme === "dark";
            document.getElementById("theme-toggle").textContent = theme === "dark" ? "☀" : "🌙";
            try { localStorage.setItem("math-agent-theme", theme); } catch(e) {}
            // 更新 mermaid 主题
            if (window.mermaid) {
                mermaid.initialize({
                    startOnLoad: false,
                    securityLevel: "loose",
                    theme: theme === "dark" ? "dark" : "default"
                });
            }
        }
        function toggleTheme() {
            setTheme(getTheme() === "dark" ? "light" : "dark");
        }

        document.getElementById("theme-toggle").addEventListener("click", toggleTheme);
        document.getElementById("enable-dark").addEventListener("change", function() {
            setTheme(this.checked ? "dark" : "light");
        });

        // 初始化主题
        setTheme(getTheme());

        // ===== 全局状态 =====
        let currentSessionId = null;
        let sending = false;
        const box = document.getElementById("chat-box");
        const questionInput = document.getElementById("question");
        const sendBtn = document.getElementById("send-btn");
        const sessionListEl = document.getElementById("session-list");
        const layoutEl = document.querySelector(".layout");
        const settingsModal = document.getElementById("settings-modal");
        const settingsBtn = document.getElementById("settings-btn");
        const closeSettingsBtn = document.getElementById("close-settings-btn");
        const hideSidebarBtn = document.getElementById("hide-sidebar-btn");
        const sidebarToggleBtn = document.getElementById("sidebar-toggle");
        const attachBtn = document.getElementById("attach-btn");
        const fileInput = document.getElementById("file-input");
        const attachmentListEl = document.getElementById("attachment-list");

        let attachments = [];
        let uploading = false;

        let mermaidReady = false;
        if (window.mermaid) {
            mermaid.initialize({
                startOnLoad: false,
                securityLevel: "loose",
                theme: getTheme() === "dark" ? "dark" : "default"
            });
            mermaidReady = true;
        }

        let md = null;
        try {
            if (window.markdownit) {
                md = window.markdownit({
                    html: false,
                    linkify: true,
                    breaks: true,
                });
                md.enable("table");
                var defaultFence = md.renderer.rules.fence || function(tokens, idx, options, env, self) {
                    return self.renderToken(tokens, idx, options);
                };
                md.renderer.rules.fence = function(tokens, idx, options, env, self) {
                    var token = tokens[idx];
                    var info = token.info ? token.info.trim() : "";
                    if (info === "mermaid" || info === "mmd") {
                        return '<div class="mermaid">' + token.content + '</div>';
                    }
                    // 为代码块添加 JetBrains Mono
                    var langClass = info ? ' class="language-' + info + '"' : '';
                    return '<pre><code' + langClass + '>' + token.content + '</code></pre>';
                };
            }
        } catch(e) { md = null; }

        function renderMarkdownToHtml(text) {
            if (!md) return "";
            return md.render(text || "");
        }

        function sanitizeContent(text) {
            return (text || "").replace(/\{\{\s*(\/userdata\/[^}]+)\s*\}\}/g, "$1");
        }

        function normalizeMathDelimiters(text) {
            return (text || "")
                .replace(/\\\[/g, "$$")
                .replace(/\\\]/g, "$$")
                .replace(/\\\(/g, "$")
                .replace(/\\\)/g, "$")
                .replace(/^\s*\$\s*$/gm, "$$");
        }

        var _mathStore = [];
        var _mathMarker = "◇";
        function protectMathBlocks(text) {
            _mathStore = [];
            var result = text.replace(/\$\$([\s\S]*?)\$\$/g, function(_, math) {
                _mathStore.push({ type: "block", content: math });
                return _mathMarker + "MB" + (_mathStore.length - 1) + _mathMarker;
            });
            result = result.replace(/\$([^\s\$](?:[^\$]*[^\s\$])?)\$/g, function(_, math) {
                _mathStore.push({ type: "inline", content: math });
                return _mathMarker + "MI" + (_mathStore.length - 1) + _mathMarker;
            });
            return result;
        }
        function restoreMathBlocks(html) {
            var esc = _mathMarker.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            var reBlock = new RegExp(esc + "MB(\\d+)" + esc, "g");
            var reInline = new RegExp(esc + "MI(\\d+)" + esc, "g");
            html = html.replace(reBlock, function(_, i) {
                var m = _mathStore[+i];
                return m && m.type === "block" ? "$$" + m.content + "$$" : "";
            });
            html = html.replace(reInline, function(_, i) {
                var m = _mathStore[+i];
                return m && m.type === "inline" ? "$" + m.content + "$" : "";
            });
            _mathStore = [];
            return html;
        }

        function extractImageUrls(text) {
            const urls = [];
            const regex = /(\/userdata\/[^\s)"']+\.(?:png|jpg|jpeg|webp))/gi;
            let match;
            while ((match = regex.exec(text))) {
                urls.push(match[1]);
            }
            return Array.from(new Set(urls));
        }

        function renderMath(el) {
            if (!window.renderMathInElement) return;
            window.renderMathInElement(el, {
                delimiters: [
                    { left: "$$", right: "$$", display: true },
                    { left: "$", right: "$", display: false },
                ],
                throwOnError: false,
            });
        }

        function renderAttachmentList() {
            attachmentListEl.innerHTML = "";
            attachments.forEach((item, index) => {
                const chip = document.createElement("div");
                chip.className = "attachment-chip";
                if (item.kind === "image" && item.url) {
                    const img = document.createElement("img");
                    img.src = item.url;
                    img.alt = item.name || "image";
                    chip.appendChild(img);
                }
                const label = document.createElement("span");
                label.textContent = item.name || item.stored_name || "attachment";
                chip.appendChild(label);
                const removeBtn = document.createElement("button");
                removeBtn.className = "attachment-remove";
                removeBtn.type = "button";
                removeBtn.textContent = "×";
                removeBtn.onclick = function() {
                    attachments.splice(index, 1);
                    renderAttachmentList();
                };
                chip.appendChild(removeBtn);
                attachmentListEl.appendChild(chip);
            });
        }

        function renderAttachmentPreview(container, items) {
            if (!items || !items.length) return;
            const list = document.createElement("div");
            list.className = "attachment-list";
            items.forEach((item) => {
                const chip = document.createElement("div");
                chip.className = "attachment-chip";
                if (item.kind === "image" && item.url) {
                    const img = document.createElement("img");
                    img.src = item.url;
                    img.alt = item.name || "image";
                    chip.appendChild(img);
                }
                const label = document.createElement("span");
                label.textContent = item.name || item.stored_name || "attachment";
                chip.appendChild(label);
                list.appendChild(chip);
            });
            container.appendChild(list);
        }

        async function uploadFile(file) {
            if (!currentSessionId) { await createSession(); }
            const formData = new FormData();
            formData.append("file", file);
            formData.append("session_id", currentSessionId || "");
            const res = await fetch("/upload", { method: "POST", body: formData });
            if (!res.ok) { throw new Error(await parseError(res)); }
            return await res.json();
        }

        questionInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendQuestion();
            }
        });

        attachBtn.addEventListener("click", function() { fileInput.click(); });

        fileInput.addEventListener("change", async function() {
            const files = Array.from(fileInput.files || []);
            if (!files.length) return;
            uploading = true;
            for (const file of files) {
                try {
                    const result = await uploadFile(file);
                    attachments.push(result);
                } catch(err) {
                    alert("上传失败：" + err.message);
                }
            }
            uploading = false;
            fileInput.value = "";
            renderAttachmentList();
        });

        box.addEventListener("dblclick", function(e) {
            const target = e.target;
            if (target && target.tagName === "IMG" && target.src) {
                window.open(target.src, "_blank");
            }
        });

        async function loadSettings() {
            try {
                const res = await fetch("/settings/load");
                if (res.ok) {
                    const cfg = await res.json();
                    document.getElementById("enable-thinking").checked = cfg.thinking === "enabled";
                    document.getElementById("thinking-strength").value = cfg.thinking_strength || "high";
                    document.getElementById("enable-search").checked = !!cfg.search;
                    document.getElementById("enable-memory").checked = !!cfg.memory;
                }
            } catch(e) {}
        }

        async function saveSettings() {
            const cfg = {
                thinking: document.getElementById("enable-thinking").checked ? "enabled" : "disabled",
                thinking_strength: document.getElementById("thinking-strength").value,
                search: document.getElementById("enable-search").checked,
                memory: document.getElementById("enable-memory").checked,
            };
            try {
                await fetch("/settings/save", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(cfg),
                });
            } catch(e) {}
        }

        ["enable-thinking", "enable-search", "enable-memory"].forEach(function(id) {
            document.getElementById(id).addEventListener("change", saveSettings);
        });
        document.getElementById("thinking-strength").addEventListener("change", saveSettings);

        window.onload = async function() {
            await loadSettings();
            await refreshSessions();
            if (currentSessionId) {
                await loadSessionMessages(currentSessionId);
            } else {
                renderEmptyChat();
            }
        };

        function toggleSidebar(forceHidden) {
            const shouldHide = typeof forceHidden === "boolean"
                ? forceHidden
                : !layoutEl.classList.contains("sidebar-hidden");
            layoutEl.classList.toggle("sidebar-hidden", shouldHide);
        }

        function openSettings() { settingsModal.classList.add("open"); }
        function closeSettings() { settingsModal.classList.remove("open"); }

        settingsBtn.addEventListener("click", openSettings);
        closeSettingsBtn.addEventListener("click", closeSettings);
        settingsModal.addEventListener("click", function(e) {
            if (e.target === settingsModal) { closeSettings(); }
        });

        hideSidebarBtn.addEventListener("click", function() { toggleSidebar(true); });
        sidebarToggleBtn.addEventListener("click", function() { toggleSidebar(); });

        function normalizeSessionId(value) {
            if (value === null || value === undefined || value === "") { return null; }
            return String(value);
        }

        function setSendingState(value) {
            sending = value;
            sendBtn.disabled = value;
            questionInput.disabled = value;
            attachBtn.disabled = value;
        }

        function setMessageContent(div, role, content) {
            const body = div.querySelector(".message-body");
            if (!body) return;
            const safeContent = sanitizeContent(content || "");
            const imageUrls = extractImageUrls(safeContent);
            let renderText = safeContent;
            if (imageUrls.length) {
                imageUrls.forEach((url) => {
                    if (!renderText.includes(`![](${url})`)) {
                        renderText += `\n\n![](${url})`;
                    }
                });
            }
            renderText = normalizeMathDelimiters(renderText);

            if (md) {
                body.classList.remove("plain");
                var protectedText = protectMathBlocks(renderText);
                var html = renderMarkdownToHtml(protectedText);
                html = restoreMathBlocks(html);
                body.innerHTML = html;
                renderMath(body);
                if (mermaidReady) {
                    var mermaidEls = body.querySelectorAll(".mermaid:not([data-processed])");
                    for (var i = 0; i < mermaidEls.length; i++) {
                        try { mermaid.run({ nodes: [mermaidEls[i]] }); } catch(e) {}
                    }
                }
            } else {
                body.classList.add("plain");
                body.textContent = renderText || "";
                renderMath(body);
            }
        }

        function appendMessage(role, content, messageAttachments) {
            const div = document.createElement("div");
            div.className = "item " + (role === "user" ? "user" : "ai");
            const label = document.createElement("span");
            label.className = "label";
            label.textContent = role === "user" ? "{{ username }}" : "MLA";
            const body = document.createElement("div");
            body.className = "message-body";
            div.appendChild(label);
            div.appendChild(body);
            setMessageContent(div, role, content || "");
            if (role === "user" && messageAttachments && messageAttachments.length) {
                renderAttachmentPreview(body, messageAttachments);
            }
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div;
        }

        function renderMessages(messages) {
            box.innerHTML = "";
            messages.forEach((m) => {
                if (m.role === "user" || m.role === "assistant") {
                    appendMessage(m.role, m.content || "");
                }
            });
            box.scrollTop = box.scrollHeight;
        }

        function renderEmptyChat() {
            box.innerHTML = "";
            const div = document.createElement("div");
            div.className = "empty";
            div.style.marginTop = "60px";
            div.style.fontSize = "16px";
            div.innerHTML = '<div style="font-size:48px;margin-bottom:16px;">📐</div>暂无消息，开始你的数学学习之旅吧！';
            box.appendChild(div);
        }

        function renderSessionList(sessions) {
            sessionListEl.innerHTML = "";
            if (!sessions.length) {
                const div = document.createElement("div");
                div.className = "empty";
                div.textContent = "暂无会话";
                sessionListEl.appendChild(div);
                return;
            }
            sessions.forEach((s) => {
                const sid = normalizeSessionId(s.session_id);
                const row = document.createElement("div");
                row.className = "session-row";
                const btn = document.createElement("button");
                btn.className = "session-item" + (sid === currentSessionId ? " active" : "");
                btn.textContent = s.title || "new";
                btn.onclick = async function() {
                    if (sending || sid === currentSessionId) return;
                    currentSessionId = sid;
                    renderSessionList(sessions);
                    await loadSessionMessages(sid);
                };
                const editBtn = document.createElement("button");
                editBtn.className = "mini-btn edit";
                editBtn.type = "button";
                editBtn.title = "修改标题";
                editBtn.textContent = "✎";
                editBtn.onclick = async function(e) {
                    e.stopPropagation();
                    if (sending) return;
                    const nextTitle = prompt("请输入新的会话标题（最多15字）", s.title || "");
                    if (!nextTitle) return;
                    await updateSessionTitle(sid, nextTitle);
                };
                const delBtn = document.createElement("button");
                delBtn.className = "mini-btn delete";
                delBtn.type = "button";
                delBtn.title = "删除会话";
                delBtn.textContent = "×";
                delBtn.onclick = async function(e) {
                    e.stopPropagation();
                    if (sending) return;
                    if (!confirm("确认删除该会话及其所有消息吗？")) return;
                    await deleteSession(sid);
                };
                row.appendChild(btn);
                row.appendChild(editBtn);
                row.appendChild(delBtn);
                sessionListEl.appendChild(row);
            });
        }

        async function parseError(res) {
            const contentType = (res.headers.get("Content-Type") || "").toLowerCase();
            if (contentType.includes("application/json")) {
                try {
                    const data = await res.json();
                    return data.error || JSON.stringify(data);
                } catch(e) { return "unknown_error"; }
            }
            try { return await res.text(); }
            catch(e) { return "unknown_error"; }
        }

        async function refreshSessions(preferredSessionId) {
            const res = await fetch("/session/list");
            if (!res.ok) {
                if (res.status === 401) { location.href = "/login"; return; }
                throw new Error(await parseError(res));
            }
            const sessions = await res.json();
            const preferred = normalizeSessionId(preferredSessionId);
            const current = normalizeSessionId(currentSessionId);
            if (preferred && sessions.some((s) => normalizeSessionId(s.session_id) === preferred)) {
                currentSessionId = preferred;
            } else if (current && sessions.some((s) => normalizeSessionId(s.session_id) === current)) {
                currentSessionId = current;
            } else {
                currentSessionId = sessions.length ? normalizeSessionId(sessions[0].session_id) : null;
            }
            renderSessionList(sessions);
        }

        async function createSession() {
            if (sending) return;
            const res = await fetch("/session/new", { method: "POST" });
            if (!res.ok) {
                alert("新建会话失败：" + await parseError(res));
                return;
            }
            const data = await res.json();
            currentSessionId = normalizeSessionId(data.session_id);
            await refreshSessions(currentSessionId);
            renderMessages([]);
        }

        async function deleteSession(sessionId) {
            const sid = normalizeSessionId(sessionId);
            if (!sid) return;
            const deletingCurrent = sid === currentSessionId;
            const res = await fetch("/session/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ session_id: sid }),
            });
            if (!res.ok) {
                alert("删除会话失败：" + await parseError(res));
                return;
            }
            await refreshSessions(deletingCurrent ? null : currentSessionId);
            if (currentSessionId) {
                await loadSessionMessages(currentSessionId);
            } else {
                renderEmptyChat();
            }
        }

        async function updateSessionTitle(sessionId, title) {
            const sid = normalizeSessionId(sessionId);
            if (!sid) return;
            const trimmed = String(title || "").trim();
            if (!trimmed) return;
            const res = await fetch("/session/title", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ session_id: sid, title: trimmed }),
            });
            if (!res.ok) {
                alert("修改标题失败：" + await parseError(res));
                return;
            }
            await refreshSessions(sid);
        }

        async function loadSessionMessages(sessionId) {
            const sid = normalizeSessionId(sessionId);
            if (!sid) { renderEmptyChat(); return; }
            const res = await fetch("/session/messages?session_id=" + encodeURIComponent(sid));
            if (!res.ok) {
                const err = await parseError(res);
                if (res.status === 404) {
                    await refreshSessions();
                    renderEmptyChat();
                    return;
                }
                alert("加载会话失败：" + err);
                return;
            }
            const data = await res.json();
            renderMessages(data.messages || []);
        }

        async function sendQuestion() {
            if (sending || uploading) return;
            const q = questionInput.value.trim();
            if (!q) return;
            if (!currentSessionId) { await createSession(); }
            const messageAttachments = attachments.slice();
            attachments = [];
            renderAttachmentList();
            appendMessage("user", q, messageAttachments);
            const aiDiv = appendMessage("assistant", "");
            questionInput.value = "";
            setSendingState(true);
            try {
                const res = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        question: q,
                        session_id: currentSessionId,
                        attachments: messageAttachments,
                        enable_thinking: document.getElementById("enable-thinking").checked,
                        thinking_strength: document.getElementById("thinking-strength").value,
                        search: document.getElementById("enable-search").checked,
                        memory: document.getElementById("enable-memory").checked,
                    }),
                });
                if (!res.ok) {
                    setMessageContent(aiDiv, "assistant", await parseError(res));
                    return;
                }
                const headerSessionId = normalizeSessionId(res.headers.get("X-Session-Id"));
                if (headerSessionId) { currentSessionId = headerSessionId; }
                if (!res.body) {
                    setMessageContent(aiDiv, "assistant", await res.text());
                } else {
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder("utf-8");
                    let answer = "";
                    while (true) {
                        const result = await reader.read();
                        if (result.done) break;
                        answer += decoder.decode(result.value, { stream: true });
                        setMessageContent(aiDiv, "assistant", answer);
                        box.scrollTop = box.scrollHeight;
                    }
                    answer += decoder.decode();
                    setMessageContent(aiDiv, "assistant", answer);
                }
                await refreshSessions(currentSessionId);
            } catch(e) {
                setMessageContent(aiDiv, "assistant", "请求失败，" + e.message);
            } finally {
                setSendingState(false);
            }
        }
    </script>
</body>
</html>
